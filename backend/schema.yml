security:
  - BearerAuth: []
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: |
        Permisos: Publico
        Codigos: 200, 400, 401
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: |
        Permisos: Autenticado
        Codigos: 204, 401
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/me:
    get:
      tags: [Auth]
      summary: Perfil del usuario autenticado
