    post:
      tags: [Porteria]
      summary: Registrar movimiento de porteria
      description: |
        Permisos: Administrador, Porteria
        Codigos: 201, 400, 401, 403
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MovimientoPorteria'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovimientoPorteria'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /reportes:
    get:
      tags: [Reportes]
      summary: Obtener reportes
      description: |
        Permisos: Administrador
        Codigos: 200, 401, 403
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reporte'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail: "Datos invalidos"
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail: "Credenciales invalidas"
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail: "No tienes permisos para esta accion"
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            detail: "Recurso no encontrado"
  schemas:
    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
      example:
        detail: "Mensaje de error"
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
      example:
        email: admin@correo.com
        password: "Pass1234!"
    TokenResponse:
      type: object
      properties:
        access:
          type: string
        refresh:
          type: string
      example:
        access: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refresh: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        is_active:
          type: boolean
      example:
        id: 1
        email: admin@correo.com
        first_name: Admin
        last_name: IBV
        is_active: true
    UserCreate:
      allOf:
        - $ref: '#/components/schemas/User'
      example:
        email: nuevo@correo.com
        first_name: Nuevo
        last_name: Usuario
        is_active: true
    UserUpdate:
      allOf:
        - $ref: '#/components/schemas/User'
      example:
        first_name: Actualizado
        last_name: Usuario
    Role:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      example:
        id: 1
        name: Administrador
    Buque:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
        identificacion:
          type: string
        fecha_arribo:
          type: string
          format: date
      example:
        id: 10
        nombre: Buque Pacifico
        identificacion: BQ-2026-001
        fecha_arribo: "2026-02-22"
    ModeloVehiculo:
      type: object
      properties:
        id:
          type: integer
        marca:
          type: string
        modelo:
          type: string
        anio:
          type: integer
        tipo:
          type: string
      example:
        id: 3
        marca: Toyota
        modelo: Hilux
        anio: 2025
        tipo: Pickup
    Vehiculo:
      type: object
      properties:
        id:
          type: integer
        bin:
          type: string
        qr_code:
          type: string
        buque_id:
          type: integer
        modelo_id:
          type: integer
        color:
          type: string
        estado:
          type: string
        fecha_registro:
          type: string
          format: date-time
      example:
        id: 200
        bin: JTEBR3FJ5KJ123456
        qr_code: QR-200
        buque_id: 10
        modelo_id: 3
        color: Blanco
        estado: RECEPCIONADO
        fecha_registro: "2026-02-22T12:00:00Z"
    Impronta:
      type: object
      properties:
        id:
          type: integer
        vehiculo_id:
          type: integer
        foto_url:
          type: string
        datos_impronta:
          type: string
        usuario_id:
          type: integer
        fecha:
          type: string
          format: date-time
        estado:
          type: string
      example:
        id: 501
        vehiculo_id: 200
        foto_url: https://files.example.com/improntas/200.jpg
        datos_impronta: "VIN verificado"
        usuario_id: 1
        fecha: "2026-02-22T13:00:00Z"
        estado: COMPLETA
    Inventario:
      type: object
      properties:
        id:
          type: integer
        vehiculo_id:
          type: integer
        checklist_json:
          type: object
        completo:
          type: boolean
        usuario_id:
          type: integer
        fecha:
          type: string
          format: date-time
      example:
        id: 700
        vehiculo_id: 200
        checklist_json:
          herramientas: true
          botiquin: true
        completo: true
        usuario_id: 2
        fecha: "2026-02-22T14:00:00Z"
    Despacho:
      type: object
      properties:
        id:
          type: integer
        fecha:
          type: string
          format: date-time
        usuario_id:
          type: integer
        cantidad_vehiculos:
          type: integer
        estado:
          type: string
      example:
        id: 900
        fecha: "2026-02-22T15:00:00Z"
        usuario_id: 3
        cantidad_vehiculos: 5
        estado: EN_PROCESO
    MovimientoPorteria:
      type: object
      properties:
        id:
          type: integer
        tipo:
          type: string
        vehiculo_id:
          type: integer
        persona:
          type: string
        usuario_id:
          type: integer
        fecha:
          type: string
          format: date-time
      example:
        id: 1001
        tipo: ENTRADA
        vehiculo_id: 200
        persona: Juan Perez
        usuario_id: 4
        fecha: "2026-02-22T16:00:00Z"
    Reporte:
      type: object
      properties:
        id:
          type: integer
        tipo:
          type: string
        url:
          type: string
        generado_en:
          type: string
          format: date-time
      example:
        id: 1
        tipo: DESPACHOS_DIARIOS
        url: https://files.example.com/reportes/despachos-2026-02-22.xlsx
        generado_en: "2026-02-22T18:00:00Z"
fecha:
  type: string
  format: date-time